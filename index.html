<!DOCTYPE html>
    <html lang="en" data-theme="dark">
        <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>TheVoid</title>
            <link rel="stylesheet" href="styles.css" />
        </head>
        <body>

            <header>
                <div id="header-side">
                    <h1>TheVoid</h1>
                    <p>say anything, anonymously.</p>
                </div>
                <button id="theme-toggle" aria-label="Toggle Theme">☀️</button>
            </header>

            <main>
                 
                <!-- create post -->
                <section id="composer">
                    <div id="composer-header">
                        <span>New Post</span>
                    </div>
                    <textarea id="post-text" placeholder="input text..." maxlength="10000"></textarea>
                    <div id="composer-footer">
                        <div id="expiry-options">
                            <span>EXPIRES</span>
                            <button class="expiry-bun active" data-value="">Never</button>
                            <button class="expiry-bun" data-value="24h">24 hours</button>
                            <button class="expiry-bun" data-value="7d">7 days</button>
                            <button class="expiry-bun" data-value="30d">30 days</button>
                        </div>
                        <div id="composer-side">
                            <span id="char-count">0 / 10000</span>
                                <button id="submit-bun" disabled>Post to the void</button>
                        </div>
                    </div>
                </section>

                <!-- searching and sorting for posts -->
                <section id="controls">
                    <input type="text" id="search-text" placeholder="search for posts..." />
                    <div id="sort-buttons">
                        <button class="sort-bun active" data-sort="newest">newest</button>
                        <button class="sort-bun" data-sort="oldest">oldest</button>
                        <button class="sort-bun" data-sort="most-liked">most liked</button>
                        <button class="sort-bun" data-sort="most-commented">most commented</button>                    </div>
                    <button id="random-bun">random post</button>
                </section>

                <!-- post of the day -->
                <div id="potd-container"></div>

                <section id="posts-feed"></section>

            </main>

            <div id="toast"></div>

            <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.98.2"></script>
            <script src="app.js"></script>

        </body>
    </html>
